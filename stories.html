            <!--
                HOW TO ADD A NEW STORY:
                1. Copy one <a class="polaroid"> block
                2. Change href to your story's page (e.g. "story-title.html")
                3. Replace the img src, caption, and date
                4. Adjust the rotate value in style="" — small values like
                   rotate(-3deg) or rotate(2deg) look most natural.
                   Mix negatives and positives so they feel scattered.
                5. Add class="taped" to some cards for the tape effect
            -->

            <a href="../story/TBD-a-short-story" class="polaroid taped" style="transform: rotate(-4deg);">
